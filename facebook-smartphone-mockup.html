<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Smartphone Mockup with Facebook Feed</title>
    <style>
        /* =========================================
           CSS Reset and Base Styles 
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Flex layout to center the component vertically and horizontally */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* Clean modern backdrop */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        /* =========================================
           Smartphone Mockup Hardware CSS
           ========================================= */

        .phone-wrapper {
            position: relative;
            width: 360px; /* Base width */
            height: 720px; /* Base height */
            /* Responsive: shrinks down on smaller screens */
            max-width: 100%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Phone Bezel / Frame */
        .phone-frame {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #1a1a1c; /* Deep black chassis color */
            border-radius: 48px; /* Smooth rounded corners */
            border: 14px solid #1a1a1c; /* Outer thick bezel */
            /* Advanced shadows for 3D realism */
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.4), 
                inset 0 0 5px rgba(255, 255, 255, 0.3), 
                inset 0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 1;
            /* Ensures internal content doesn't overflow outside the rounded bezel */
            overflow: hidden; 
        }

        /* Simulated Notch (Dynamic Island or Camera array) */
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 28px;
            background-color: #1a1a1c;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 10;
        }

        /* Volume and Power Buttons simulation using pseudo elements */
        .hardware-buttons::before,
        .hardware-buttons::after {
            content: '';
            position: absolute;
            background-color: #333336; /* Button color */
            border-radius: 3px;
            z-index: -1;
        }

        /* Volume Up / Down Buttons (Left Side) */
        .hardware-buttons::before {
            left: -18px;
            top: 140px;
            width: 4px;
            height: 50px;
            /* We use box-shadow to mirror the button to create a second volume button below it */
            box-shadow: 0 65px 0 0 #333336; 
        }

        /* Power Button (Right Side) */
        .hardware-buttons::after {
            right: -18px;
            top: 170px;
            width: 4px;
            height: 70px;
        }

        /* =========================================
           Smartphone Screen Layer CSS
           ========================================= */

        .phone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            border-radius: 34px; /* Slightly less than the outer frame to nest correctly */
            overflow: hidden; /* Clips scrolling completely inside the screen bounds */
            display: flex;
            flex-direction: column;
        }

        /* Top Status Bar (Time, Wifi, Battery simulation) */
        .status-bar {
            height: 42px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
            font-weight: 600;
            color: #000;
            z-index: 5;
            flex-shrink: 0; /* Important: keeps status bar fixed */
        }

        /* Scrollable area inside the phone (This is what actually scrolls) */
        .scrollable-content {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            /* Native momentum scroll optimization for mobile browsers */
            -webkit-overflow-scrolling: touch;
            background-color: #f0f2f5; /* Facebook's native background color constraint */
        }

        /* Facebook Iframe Container override */
        .fb-iframe-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .fb-iframe-wrapper iframe {
            border: none;
            width: 100%;
            /* Fixed large height so it scrolls within the parent .scrollable-content */
            height: 1000px !important; 
        }

        /* =========================================
           Controls interface (Outside the phone)
           ========================================= */

        .config-panel {
            margin-top: 40px;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 360px;
            max-width: 100%;
        }

        .config-panel label {
            font-size: 15px;
            font-weight: 600;
            color: #1c1e21;
        }

        .config-panel input {
            padding: 12px 14px;
            border: 1.5px solid #ccd0d5;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .config-panel input:focus {
            border-color: #1877F2;
        }

        .config-panel button {
            background-color: #1877F2; /* Facebook Blue */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .config-panel button:hover {
            background-color: #166fe5;
        }
        
        .config-panel button:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <!-- Smartphone Structure Start -->
    <div class="phone-wrapper">
        <div class="hardware-buttons"></div>
        
        <div class="phone-frame">
            <!-- Simulated Notch -->
            <div class="phone-notch"></div>
            
            <div class="phone-screen">
                <!-- Status bar with dynamic clock -->
                <div class="status-bar">
                    <span id="clock" style="margin-left: 2px;">9:41</span>
                    <!-- Simple icons representation -->
                    <span style="letter-spacing: 2px;">📶🔋</span>
                </div>
                
                <!-- Internal Component bounds that scroll -->
                <div class="scrollable-content" id="fbContainer">
                    <div class="fb-iframe-wrapper">
                        <!-- Facebook Page Plugin Iframe initially embedded -->
                        <iframe id="fbIframe"
                            src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Ffacebook&tabs=timeline&width=332&height=1000&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true" 
                            scrolling="no" 
                            allowfullscreen="true" 
                            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Smartphone Structure End -->

    <!-- URL Controller to easily swap Facebook Pages -->
    <div class="config-panel">
        <label for="fbUrlInput">Update Facebook Page Embedded:</label>
        <input type="text" id="fbUrlInput" value="https://www.facebook.com/facebook" placeholder="E.g., https://www.facebook.com/zuck">
        <button onclick="updateFbPlugin()">Apply New Page URL</button>
    </div>

    <!-- JavaScript block -->
    <script>
        // Set real local time for the status bar clock to increase realism
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            // Format 12-hour
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = hours + ':' + minutes;
        }
        
        // Initial call and set interval to update every minute
        updateClock(); 
        setInterval(updateClock, 60000);

        // Core logic to refresh the Facebook iframe source when user updates the url
        function updateFbPlugin() {
            const fbUrl = document.getElementById('fbUrlInput').value.trim();
            const iframe = document.getElementById('fbIframe');
            
            if (!fbUrl) {
                alert('Please enter a valid page URL.');
                return;
            }

            // Correctly encode component to be safe as a URL Query Parameter
            const encodedUrl = encodeURIComponent(fbUrl);
            
            // Build the URL applying the user's custom page href, matching fixed width 332 and tall 1000 height params
            const newSrc = `https://www.facebook.com/plugins/page.php?href=${encodedUrl}&tabs=timeline&width=332&height=1000&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true`;
            
            // Reassign iframe src to trigger reload with new content
            iframe.src = newSrc;
        }
    </script>
</body>
</html>
